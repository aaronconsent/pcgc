name = "pcgc"
main = "src/worker.js"
compatibility_date = "2026-04-01"

# Static-asset bucket: the worker calls env.ASSETS.fetch(request) for
# anything not handled by /api/booking. Directory-index resolution
# (e.g. /about/ -> site/about/index.html) happens automatically.
[assets]
directory = "./site"
binding = "ASSETS"

# Stores one record per rental booking under the `booking:<ts>:<id>`
# prefix. (The name FEEDBACK_KV is kept as the binding for backwards
# compatibility with the existing namespace id.)
[[kv_namespaces]]
binding = "FEEDBACK_KV"
id = "be6aa9b721f34655b1596c8d8660097f"
