<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Rental Bookings · PCGC Admin</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logos/logo-color.svg">
  <link rel="stylesheet" href="/assets/site.css">
  <style>
    .bk-page { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 6rem; }
    .bk-page h1 { color: var(--teal-dk); margin-bottom: .35rem; }
    .bk-page .sub { color: var(--ink-soft); margin-bottom: 2rem; }
    .bk-status { text-align: center; padding: 3rem; color: var(--ink-soft); }
    .bk-entry {
      background: #fff; border: 1px solid var(--line);
      border-left: 4px solid var(--teal-dk);
      border-radius: 10px; padding: 1.25rem 1.4rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .bk-entry header {
      display: flex; gap: 1rem; align-items: baseline;
      justify-content: space-between; flex-wrap: wrap;
      font-size: .85rem; color: var(--ink-soft); margin-bottom: .65rem;
    }
    .bk-entry .id { font: 700 .95rem ui-monospace, monospace; color: var(--coral); }
    .bk-entry .ts { color: var(--ink-soft); }
    .bk-entry .grid {
      display: grid; gap: .85rem;
      grid-template-columns: 1fr 1fr;
      margin: .65rem 0;
    }
    @media (max-width: 600px) { .bk-entry .grid { grid-template-columns: 1fr; } }
    .bk-entry .field b { display: block; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); }
    .bk-entry .field span { color: var(--ink); }
    .bk-items {
      background: var(--bg); border-radius: 8px;
      padding: .65rem .85rem; margin-top: .65rem;
      font-size: .9rem;
    }
    .bk-items .row {
      display: flex; justify-content: space-between;
      padding: .15rem 0; color: var(--ink);
    }
    .bk-items .row.total { font-weight: 700; border-top: 1px solid var(--line); padding-top: .35rem; margin-top: .35rem; }
    .bk-empty { text-align: center; padding: 3rem 1rem; color: var(--ink-soft); }
    .bk-empty h2 { color: var(--teal-dk); }

    /* Status pill: color tracks the lifecycle. */
    .bk-pill {
      display: inline-flex; align-items: center; gap: .35rem;
      font: 700 .72rem ui-monospace, monospace;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .25rem .6rem; border-radius: 999px;
      border: 1px solid currentColor;
    }
    .bk-pill[data-status="new"]         { color: #c2261a; background: #fde9e6; border-color: #f3c3bc; }
    .bk-pill[data-status="picked-up"]   { color: #1f5a68; background: #d6ecf0; border-color: #9fcfd7; }
    .bk-pill[data-status="delivered"]   { color: #1f5a68; background: #d6ecf0; border-color: #9fcfd7; }
    .bk-pill[data-status="returned"]    { color: #2f6b3b; background: #dff0e1; border-color: #a7d4ad; }

    .bk-status-row {
      display: flex; align-items: center; gap: .6rem;
      margin-top: .85rem; padding-top: .85rem;
      border-top: 1px dashed var(--line);
      font-size: .9rem;
    }
    .bk-status-row label { color: var(--ink-soft); font-weight: 600; }
    .bk-status-row select {
      font: inherit; padding: .35rem .6rem;
      border: 1px solid var(--line); border-radius: 6px;
      background: #fff;
    }
    .bk-status-row .bk-status-msg {
      margin-left: auto;
      font-size: .85rem; color: var(--ink-soft);
    }
    .bk-status-row .bk-status-msg.error { color: #c2261a; }
    .bk-status-row .bk-status-msg.success { color: #2f6b3b; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/">
        <img class="brand-mark" src="/assets/logos/logo-color.svg" alt="" width="144" height="112" aria-hidden="true">
        <span class="brand-text">Polk County Golf Carts<small>Admin · Rentals</small></span>
      </a>
    </div>
  </header>
  <main class="bk-page">
    <!-- Login view: shown by default. The page hits /api/booking on load;
         if the API returns 401 we drop the user here. -->
    <section id="login-view" hidden>
      <h1>PCGC Admin</h1>
      <p class="sub">Sign in to see rental bookings.</p>
      <form id="login-form" style="max-width:340px; margin:0 auto; display:flex; flex-direction:column; gap:.75rem;">
        <label style="display:flex; flex-direction:column; gap:.35rem;">
          <span style="font-weight:600;">Password</span>
          <input type="password" id="login-password" required autocomplete="current-password" style="padding:.7rem .85rem; border:1px solid var(--line); border-radius:8px; font:inherit;">
        </label>
        <button type="submit" class="btn btn-coral" id="login-submit" style="margin-top:.35rem;">Sign in</button>
        <p id="login-error" style="color:#c2261a; margin:0; font-size:.92rem;" hidden></p>
      </form>
    </section>

    <!-- Bookings view: shown after successful auth. -->
    <section id="bookings-view" hidden>
      <header style="display:flex; align-items:baseline; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
        <div>
          <h1 style="margin-bottom:.25rem;">Rental bookings</h1>
          <p class="sub" style="margin:0;">Submissions through the <a href="/rentals/">/rentals/</a> flow, newest first.</p>
        </div>
        <button type="button" id="logout-btn" class="btn btn-ghost" style="font-size:.92rem;">Sign out</button>
      </header>
      <div id="bk-out" class="bk-status" style="margin-top:1.5rem;">Loading…</div>
    </section>
  </main>
  <script>
  (() => {
    const loginView = document.getElementById("login-view");
    const bookingsView = document.getElementById("bookings-view");
    const out = document.getElementById("bk-out");
    const loginForm = document.getElementById("login-form");
    const loginPassword = document.getElementById("login-password");
    const loginSubmit = document.getElementById("login-submit");
    const loginError = document.getElementById("login-error");
    const logoutBtn = document.getElementById("logout-btn");

    function showLogin(msg) {
      bookingsView.hidden = true;
      loginView.hidden = false;
      if (msg) { loginError.textContent = msg; loginError.hidden = false; }
      else { loginError.hidden = true; }
      loginPassword.focus();
    }
    function showBookings() {
      loginView.hidden = true;
      bookingsView.hidden = false;
    }

    async function fetchAndRender() {
      out.textContent = "Loading…";
      out.className = "bk-status";
      let res;
      try {
        res = await fetch("/api/booking", { credentials: "same-origin" });
      } catch (e) {
        out.textContent = "Network error: " + e.message;
        return;
      }
      if (res.status === 401) { showLogin(); return; }
      if (!res.ok) {
        const t = await res.text();
        out.textContent = "Error " + res.status + ": " + t;
        return;
      }
      showBookings();
      const data = await res.json();
      renderEntries((data && data.entries) || []);
    }

    function renderEntries(entries) {
      // Clear any prior render — re-renders happen after login.
      [...document.querySelectorAll(".bk-entry")].forEach(el => el.remove());
      out.className = "";
      if (!entries.length) {
        out.innerHTML = '<div class="bk-empty"><h2>No bookings yet</h2><p>Customer rentals from /rentals/ will appear here.</p></div>';
        return;
      }
      out.textContent = "";
      const fmtMoney = n => "$" + (Number(n) || 0).toFixed(2);
      const fmtDate = iso => iso ? new Date(iso + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "—";
      const deliveryLabel = { pickup: "Pickup at shop", local: "Free delivery (≤25 mi)", extended: "Extended delivery (25–100 mi, fee quoted separately)" };
      const statusLabel = { "new": "New Order", "picked-up": "Picked Up", "delivered": "Delivered", "returned": "Returned" };
      const statusOptions = ["new", "picked-up", "delivered", "returned"];
      for (const b of entries) {
        const wrap = document.createElement("article");
        wrap.className = "bk-entry";
        const head = document.createElement("header");
        const status = b.status || "new";
        head.innerHTML = `<span class="id"></span><span class="bk-pill" data-status="${status}">${statusLabel[status] || status}</span><span class="ts"></span>`;
        head.querySelector(".id").textContent = b.id || "—";
        head.querySelector(".ts").textContent = new Date(b.ts).toLocaleString();
        wrap.appendChild(head);

        const grid = document.createElement("div");
        grid.className = "grid";
        const c = b.contact || {};
        grid.innerHTML = `
          <div class="field"><b>Customer</b><span></span></div>
          <div class="field"><b>Trip</b><span></span></div>
          <div class="field"><b>Contact</b><span></span></div>
          <div class="field"><b>Delivery</b><span></span></div>
        `;
        const cells = grid.querySelectorAll(".field span");
        cells[0].textContent = (c.name || "—") + " · " + (c.guests || 1) + " guests";
        cells[1].textContent = fmtDate(b.dates?.start) + " → " + fmtDate(b.dates?.end) + " (" + (b.dates?.days || 0) + " day" + ((b.dates?.days || 0) === 1 ? "" : "s") + ")";
        cells[2].textContent = (c.phone || "—") + " · " + (c.email || "—");
        cells[3].textContent = (deliveryLabel[b.delivery] || b.delivery || "—") + (c.address ? " · " + c.address : "");
        wrap.appendChild(grid);

        if (c.notes) {
          const notes = document.createElement("p");
          notes.style.cssText = "margin: .35rem 0; font-style: italic; color: var(--ink-soft);";
          notes.textContent = "Notes: " + c.notes;
          wrap.appendChild(notes);
        }

        const items = document.createElement("div");
        items.className = "bk-items";
        const p = b.pricing || {};
        const rows = [];
        for (const it of (b.items || [])) {
          rows.push('<div class="row"><span>' + it.name + ' × ' + it.qty + '</span><span>' + fmtMoney(it.lineTotal) + '</span></div>');
        }
        if (b.delivery === "extended") rows.push('<div class="row"><span>Extended delivery</span><span>Quoted separately</span></div>');
        if (p.tax)           rows.push('<div class="row"><span>Tax</span><span>' + fmtMoney(p.tax) + '</span></div>');
        rows.push('<div class="row total"><span>Paid</span><span>' + fmtMoney(p.total) + '</span></div>');
        items.innerHTML = rows.join("");
        wrap.appendChild(items);

        // Status control: dropdown lets the owner advance the booking
        // through New -> Picked Up / Delivered -> Returned. Setting it
        // to "returned" triggers the customer thank-you email from the
        // Worker side.
        const statusRow = document.createElement("div");
        statusRow.className = "bk-status-row";
        statusRow.innerHTML = `
          <label for="status-${b.id}">Status</label>
          <select id="status-${b.id}" data-id="${b.id}">
            ${statusOptions.map(s => `<option value="${s}"${s === status ? " selected" : ""}>${statusLabel[s]}</option>`).join("")}
          </select>
          <span class="bk-status-msg"></span>
        `;
        wrap.appendChild(statusRow);

        const sel = statusRow.querySelector("select");
        const msg = statusRow.querySelector(".bk-status-msg");
        const pill = head.querySelector(".bk-pill");
        sel.addEventListener("change", async () => {
          const newStatus = sel.value;
          const prevStatus = pill.dataset.status;
          if (newStatus === prevStatus) return;
          sel.disabled = true;
          msg.textContent = "Saving…";
          msg.className = "bk-status-msg";
          try {
            const res = await fetch(`/api/booking/${encodeURIComponent(b.id)}`, {
              method: "PATCH",
              headers: { "content-type": "application/json" },
              credentials: "same-origin",
              body: JSON.stringify({ status: newStatus }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              msg.textContent = `Failed: ${data.error || res.status}`;
              msg.className = "bk-status-msg error";
              sel.value = prevStatus; // roll back the dropdown
              return;
            }
            // Update the pill in place.
            pill.dataset.status = newStatus;
            pill.textContent = statusLabel[newStatus];
            // Special-case the returned transition so the owner sees
            // whether the thank-you email actually went out.
            if (newStatus === "returned") {
              if (data.email === "sent") {
                msg.textContent = "Saved · thank-you email sent";
              } else if (data.email && data.email.startsWith("failed")) {
                msg.textContent = "Saved · email failed (" + data.email.slice(8) + ")";
                msg.className = "bk-status-msg error";
              } else if (data.email && data.email.startsWith("skipped")) {
                msg.textContent = "Saved · email skipped (no Resend key configured)";
              } else {
                msg.textContent = "Saved";
              }
            } else {
              msg.textContent = "Saved";
              msg.className = "bk-status-msg success";
            }
            setTimeout(() => { msg.textContent = ""; msg.className = "bk-status-msg"; }, 4000);
          } catch (e) {
            msg.textContent = "Network error: " + e.message;
            msg.className = "bk-status-msg error";
            sel.value = prevStatus;
          } finally {
            sel.disabled = false;
          }
        });

        document.querySelector("#bookings-view").appendChild(wrap);
      }
    }

    loginForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const password = loginPassword.value;
      if (!password) return;
      loginSubmit.disabled = true;
      const prev = loginSubmit.textContent;
      loginSubmit.textContent = "Signing in…";
      loginError.hidden = true;
      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ password }),
        });
        if (!res.ok) {
          showLogin(res.status === 401 ? "Wrong password." : `Login failed (${res.status}).`);
          return;
        }
        loginPassword.value = "";
        await fetchAndRender();
      } catch (e) {
        showLogin("Network error: " + e.message);
      } finally {
        loginSubmit.disabled = false;
        loginSubmit.textContent = prev;
      }
    });

    logoutBtn.addEventListener("click", async () => {
      logoutBtn.disabled = true;
      try {
        await fetch("/api/admin/logout", { method: "POST", credentials: "same-origin" });
      } catch (_) { /* ignore — cookie may already be gone */ }
      showLogin();
      logoutBtn.disabled = false;
    });

    // Initial probe — if the cookie's already valid we go straight
    // to the bookings list; otherwise we land on the login form.
    fetchAndRender();
  })();
  </script>
</body>
</html>
