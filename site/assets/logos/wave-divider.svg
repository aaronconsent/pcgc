<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1440 30"
     preserveAspectRatio="none"
     width="100%"
     height="30"
     role="presentation">
  <!--
    Two-hump teal wave drawn as a single closed path.  Pure vector so
    it scales to any width without pixelation; transparent everywhere
    except the ribbon itself.  Constant 10-unit ribbon thickness so it
    reads as a proper border line rather than a tapered flourish.
  -->
  <path
    d="M0,18
       C 90,18 270,2 360,2
       C 450,2 630,18 720,18
       C 810,18 990,2 1080,2
       C 1170,2 1350,18 1440,18
       L 1440,28
       C 1350,28 1170,12 1080,12
       C 990,12 810,28 720,28
       C 630,28 450,12 360,12
       C 270,12 90,28 0,28
       Z"
    fill="#2e7a8a"/>
</svg>
